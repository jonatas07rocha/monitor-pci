<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SICOM - Simulador de Circuitos</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body { font-family: 'Inter', sans-serif; }

.circuit-line::before {
    content: '';
    position: absolute;
    left: -20px;
    top: 0;
    bottom: 0;
    width: 2px;
    border-left: 2px dashed #e2e8f0;
}

.node-dot {
    position: absolute;
    left: -26px;
    top: 22px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
}

.energy {
    background: #38bdf8 !important;
    transform: scale(1.3);
}

.node-active {
    border-color: #1e293b;
    background: #f8fafc;
}
</style>
</head>

<body class="bg-slate-100 min-h-screen p-6">

<div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">

<!-- CONTROLE -->
<div class="lg:col-span-5 bg-white p-6 rounded-xl">

<input type="file" id="jsonInput" class="mb-4">

<select id="processSelect" class="w-full p-2 border mb-4">
<option>Carregue JSON</option>
</select>

<div id="switches" class="space-y-2"></div>

<div id="errorDisplay" class="text-red-500 mt-4"></div>

</div>

<!-- VISUAL -->
<div class="lg:col-span-7 bg-white p-6 rounded-xl">

<div id="circuitOutput" class="relative ml-6 space-y-6"></div>

</div>

</div>

<script>
const UI = {
    jsonInput: document.getElementById('jsonInput'),
    processSelect: document.getElementById('processSelect'),
    circuitOutput: document.getElementById('circuitOutput'),
    error: document.getElementById('errorDisplay'),
    switches: document.getElementById('switches')
};

let workflowData = null;

const HIERARQUIA = [
 'operacional_0','operacional_1',
 'tatico_0','tatico_1',
 'estrategico_0','estrategico_1','estrategico_2'
];

// cria switches dinamicamente
HIERARQUIA.forEach(nivel=>{
    UI.switches.innerHTML += `
    <label class="flex justify-between">
        ${nivel}
        <input type="checkbox" class="level" value="${nivel}" checked>
    </label>`;
});

function getState(){
    const s = {};
    document.querySelectorAll('.level').forEach(el=>{
        s[el.value]=el.checked;
    });
    return s;
}

const Engine = {

mapToStatus(p,a){
    return p==='drh' ? `DRH_${a}` : `${p}_${a}`;
},

resolverResponsavel(p){
    if(p==='drh') return 'drh';

    const state = getState();
    const pos = HIERARQUIA.indexOf(p);

    for(let i=pos;i<HIERARQUIA.length;i++){
        if(state[HIERARQUIA[i]]) return HIERARQUIA[i];
    }
    return null;
},

getNext(processo,idx,depth=0){

    if(depth>15) throw new Error("Loop");

    const nextIdx = idx+1;
    if(nextIdx>=processo.etapas.length) return null;

    const e = processo.etapas[nextIdx];

    if(e.papel!=='drh'){
        const r = this.resolverResponsavel(e.papel);
        if(!r) throw new Error(`Sem responsável ${e.papel}`);

        if(e.acao==='da_ciencia'){
            const prox = processo.etapas.slice(nextIdx+1)
                .find(x=>x.acao==='decide');

            if(prox && this.resolverResponsavel(prox.papel)===r){
                return this.getNext(processo,nextIdx,depth+1);
            }
        }
    }

    return {
        idx: nextIdx,
        status: this.mapToStatus(e.papel,e.acao),
        etapa: e
    };
}

};

UI.jsonInput.onchange = e=>{
    const reader = new FileReader();

    reader.onload = ev=>{
        try{
            const raw = JSON.parse(ev.target.result);
            workflowData = raw.processos || raw;

            UI.processSelect.innerHTML = '<option>Selecione</option>';

            workflowData.forEach(p=>{
                const o = document.createElement('option');
                o.value = p.id;
                o.textContent = p.processo || p.id;
                UI.processSelect.appendChild(o);
            });

            UI.error.textContent='';

        }catch(err){
            UI.error.textContent = err.message;
        }
    };

    reader.readAsText(e.target.files[0]);
};

UI.processSelect.onchange = simular;
document.addEventListener('change', e=>{
    if(e.target.classList.contains('level')) simular();
});

function simular(){

    const id = UI.processSelect.value;
    if(!id || !workflowData) return;

    const proc = workflowData.find(p=>String(p.id)===id);

    UI.circuitOutput.innerHTML='';
    UI.error.textContent='';

    let idx=-1;
    let nodes=[];
    let safety=0;

    try{

        while(safety<30){
            const n = Engine.getNext(proc,idx);
            if(!n){
                nodes.push({status:'FIM'});
                break;
            }
            nodes.push(n);
            idx=n.idx;
            safety++;
        }

        render(nodes);
        animate();

    }catch(err){
        UI.error.textContent = err.message;
    }
}

function render(nodes){

    UI.circuitOutput.innerHTML='';

    nodes.forEach((n,i)=>{

        const div=document.createElement('div');
        div.className='circuit-line relative pl-8';

        div.innerHTML=`
        <div class="node-dot bg-slate-300"></div>
        <div class="p-4 border rounded-lg">
            ${n.status}
        </div>`;

        UI.circuitOutput.appendChild(div);
    });
}

function animate(){
    const dots=document.querySelectorAll('.node-dot');
    let i=0;

    function step(){
        dots.forEach(d=>d.classList.remove('energy'));
        if(dots[i]) dots[i].classList.add('energy');
        i++;
        if(i<dots.length) setTimeout(step,250);
    }

    step();
}

</script>
</body>
</html>
