<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SICOM - Simulador de Circuitos</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body { font-family: Arial; }

.switch { position: relative; display: inline-block; width: 44px; height: 24px; }
.switch input { opacity: 0; width: 0; height: 0; }

.slider {
    position: absolute; cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: #cbd5e1; border-radius: 24px;
}

.slider:before {
    position: absolute; content: "";
    height: 18px; width: 18px;
    left: 3px; bottom: 3px;
    background-color: white; border-radius: 50%;
}

input:checked + .slider { background-color: #1e293b; }
input:checked + .slider:before { transform: translateX(20px); }

.node { padding: 10px; margin: 5px; border: 1px solid #ccc; cursor: pointer; }
.error { color: red; }
</style>
</head>

<body class="p-6">

<h2 class="font-bold mb-4">Simulador de Workflow</h2>

<input type="file" id="jsonInput" accept=".json"><br><br>

<select id="processSelect">
<option value="">Carregue o JSON</option>
</select>

<div id="errorDisplay" class="error mt-3"></div>

<div id="output" class="mt-4"></div>

<script>
const UI = {
    jsonInput: document.getElementById('jsonInput'),
    processSelect: document.getElementById('processSelect'),
    output: document.getElementById('output'),
    error: document.getElementById('errorDisplay')
};

let workflowData = null;

const HIERARQUIA = [
    'operacional_0','operacional_1',
    'tatico_0','tatico_1',
    'estrategico_0','estrategico_1','estrategico_2'
];

const Engine = {

    mapToStatus(papel, acao) {
        if (papel === 'drh') return `DRH_${acao.toUpperCase()}`;
        return `${papel.toUpperCase()}_${acao.toUpperCase()}`;
    },

    resolverResponsavel(papel) {
        if (papel === 'drh') return 'drh';

        const pos = HIERARQUIA.indexOf(papel);
        if (pos === -1) throw new Error(`Papel inválido: ${papel}`);

        for (let i = pos; i < HIERARQUIA.length; i++) {
            return HIERARQUIA[i]; // simplificado (sempre existe)
        }
        return null;
    },

    getNextStatus(processo, idx, depth = 0) {

        if (depth > 10) throw new Error("Loop detectado");

        const etapas = processo.etapas;
        const nextIdx = idx + 1;

        if (nextIdx >= etapas.length) return null;

        const etapa = etapas[nextIdx];
        const papel = etapa.papel;
        const acao = etapa.acao;

        if (papel !== 'drh') {
            const resp = this.resolverResponsavel(papel);
            if (!resp) throw new Error(`Sem responsável para ${papel}`);

            if (acao === 'da_ciencia') {
                const prox = etapas.slice(nextIdx + 1).find(e => e.acao === 'decide');
                if (prox && this.resolverResponsavel(prox.papel) === resp) {
                    return this.getNextStatus(processo, nextIdx, depth + 1);
                }
            }
        }

        return {
            idx: nextIdx,
            status: this.mapToStatus(papel, acao)
        };
    }
};

UI.jsonInput.onchange = (e) => {

    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = (ev) => {
        try {
            const raw = JSON.parse(ev.target.result);

            if (Array.isArray(raw)) {
                workflowData = raw;
            } else if (raw.processos && Array.isArray(raw.processos)) {
                workflowData = raw.processos;
            } else {
                throw new Error("JSON inválido");
            }

            if (!workflowData.length) {
                throw new Error("Nenhum processo encontrado");
            }

            UI.processSelect.innerHTML = '<option value="">Selecione</option>';

            workflowData.forEach(p => {
                if (!p.id) return;

                const opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = p.processo || `Processo ${p.id}`;
                UI.processSelect.appendChild(opt);
            });

            UI.error.textContent = '';

        } catch (err) {
            workflowData = null;
            UI.processSelect.innerHTML = '<option>Erro</option>';
            UI.error.textContent = err.message;
        }
    };

    reader.readAsText(file);
};

UI.processSelect.onchange = () => {

    const id = UI.processSelect.value;
    if (!id) return;

    const proc = workflowData.find(p => String(p.id) === id);

    UI.output.innerHTML = '';

    let idx = -1;
    let safety = 0;

    try {

        while (safety < 20) {

            const next = Engine.getNextStatus(proc, idx);

            if (!next) {
                UI.output.innerHTML += `<div class="node">FIM</div>`;
                break;
            }

            UI.output.innerHTML += `<div class="node">${next.status}</div>`;

            idx = next.idx;
            safety++;
        }

    } catch (err) {
        UI.error.textContent = err.message;
    }
};
</script>

</body>
</html>
